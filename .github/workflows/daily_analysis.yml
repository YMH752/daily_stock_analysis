name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5' # 每个交易日北京时间18:00自动运行

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports public

      - name: 执行分析并输出日志
        env:
          # --- 核心配置 (保留你所有的Secret) ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          # 核心修改：强制开启 HTML 模式，确保生成网页所需文件
          REPORT_TYPE: html
        # 这一步会像图16一样在控制台实时打印分析内容
        run: python main.py

      - name: 提取网页首页
        if: always()
        run: |
          # 检查 reports 目录下是否有生成的 html 文件
          if [ "$(ls -A reports/*.html 2>/dev/null)" ]; then
            # 找到最新的一份 HTML 报告
            latest_report=$(ls -t reports/*.html | head -n 1)
            # 复制一份并改名为 index.html，这是 GitHub Pages 展示的关键
            cp "$latest_report" public/index.html
            # 将所有历史报告也存入 public 目录
            cp -r reports/* public/ 2>/dev/null || true
            echo "✅ 可视化网页文件已就绪"
          else
            echo "⚠️ 未发现 HTML 报告，请检查 REPORT_TYPE 配置"
          fi

      - name: 部署到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
