name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5' # 每个交易日北京时间18:00自动运行

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports public

      - name: 执行分析并输出日志
        env:
          # --- 核心配置 (保留你所有的Secret) ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          # 核心修改：强制开启 HTML 模式，确保生成网页所需文件
          REPORT_TYPE: html
        # 这一步会像图16一样在控制台实时打印分析内容
        run: python main.py

      - name: 整理网页文件 (支持 MD 转 HTML 展示)
        if: always()
        run: |
          mkdir -p public
          # 检查是否有 html，如果没有，就找 md 文件
          if [ "$(ls -A reports/*.html 2>/dev/null)" ]; then
            cp $(ls -t reports/*.html | head -n 1) public/index.html
            echo "✅ 已找到 HTML 报告"
          elif [ "$(ls -A reports/*.md 2>/dev/null)" ]; then
            # 这是一个关键补丁：如果只有 md，我们也把它存为 index.md 供 Pages 展示
            cp $(ls -t reports/*.md | head -n 1) public/index.md
            # 创建一个简单的跳转页，让 Pages 引擎识别
            echo "<html><body><script>window.location.href='index.md'</script></body></html>" > public/index.html
            echo "✅ 已将最新的 MD 报告设为首页"
          fi
          # 拷贝所有历史文件
          cp -r reports/* public/ 2>/dev/null || true

      - name: 部署到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

